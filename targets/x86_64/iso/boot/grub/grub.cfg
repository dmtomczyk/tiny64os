# Wait indefinitely for an explicit menu choice
set timeout=-1

# Highlight tiny64os by default, but do not auto-boot
set default=0

# Force plain text console in QEMU/GRUB
terminal_input console
terminal_output console

# Menu Colors
set menu_color_normal=white/black
set menu_color_highlight=white/green

# -------------------------------------------------
# ------------------- Boot ISOs -------------------
# -------------------------------------------------

menuentry "tiny64os" {
	multiboot2 /boot/kernel.bin
	boot
}

# CPU Information
function cpu_props {
	if cpuid -p; then
		pae_assessment="Yes"
	else 
		pae_assessment="No"
	fi
	echo ""
	if cpuid -l; then
		echo "(O<"
		echo "(/)_ .: Processor: 64bit, PAE: $pae_assessment"
	else
		echo "(O<"
		echo "(/)_ .: Processor: 32bit, PAE: $pae_assessment"
	fi
}

menuentry "Tell Me About This Machine's Processor" {
	cpu_props
	echo $"Press escape to return to the main menu"
	sleep --interruptible 9999
}

menuentry "Reboot" {
    reboot
}
